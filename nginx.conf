################################################################################
# nginx.conf — reverse proxy for KShU / TDG
#
# Serves:
#   /            → frontend static files  (./frontend/)
#   /api/*       → FastAPI backend        (http://backend:8000)
#   /ws/*        → WebSocket backend      (http://backend:8000)
#   /config/*    → frontend config files  (./frontend/config/)
#
# The backend container is named "backend" in docker-compose.
################################################################################

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Upstream: FastAPI backend ────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # ── WebSocket passthrough ──────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── REST API ──────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── Frontend static files ─────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # CSS/JS/images: cache for 1 day
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }
}

