name: tdg

services:
  postgres:
    container_name: tdg-postgres
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: tdg
      POSTGRES_PASSWORD: tdg_secret
      POSTGRES_DB: tdg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tdg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: tdg-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Local LLM — llama.cpp server (OpenAI-compatible API) ─────────
  # CPU-only inference with flash attention and prompt caching.
  # The prompt cache dramatically speeds up repeated system prompts
  # (tactical doctrine, unit roster, etc.) — first call is slow,
  # subsequent calls reuse cached KV state.
  #
  # Model file must exist at ./models/model.gguf
  #   Download: .\scripts\download_model.ps1
  #   Default: Gemma 3 1B Instruct Q4_K_M (~800MB)
  #
  # Dev (Windows native, faster — avoids WSL2 SSE4 bottleneck):
  #   .\tools\llama-cpp\llama-server.exe --model models\model.gguf --alias local --host 127.0.0.1 --port 8081 --ctx-size 16384 --threads 6 --threads-batch 6 --flash-attn on --cache-type-k q4_0 --cache-type-v q4_0 --cache-reuse 256 --mlock
  #
  # Backend .env config:
  #   LOCAL_MODEL_URL=http://localhost:8081/v1
  #   LOCAL_MODEL_NAME=local
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: tdg-llm
    profiles: ["llm"]
    volumes:
      - ./models:/models:ro
    ports:
      - "8081:8080"
    cap_add:
      - IPC_LOCK
    shm_size: "2g"
    environment:
      OMP_NUM_THREADS: "6"
    command: >
      --model /models/model.gguf
      --alias local
      --host 0.0.0.0
      --port 8080
      --ctx-size 16384
      --threads 6
      --threads-batch 6
      --parallel 1
      --batch-size 512
      --ubatch-size 256
      --flash-attn on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --cache-reuse 256
      --mlock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  pgdata:
