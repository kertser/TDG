name: tdg

services:
  postgres:
    container_name: tdg-postgres
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: tdg
      POSTGRES_PASSWORD: tdg_secret
      POSTGRES_DB: tdg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tdg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: tdg-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Local LLM sidecar (OpenAI-compatible API) ───────────────────
  # Optional: provides a local LLM for air-gapped / offline use.
  # Uses the official pre-built llama.cpp server image — NO compilation.
  #
  # Start with:  docker compose --profile llm up -d
  # Model file must exist at ./models/model.gguf
  # Download one:  .\scripts\download_model.ps1
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: tdg-llm
    profiles: ["llm"]
    volumes:
      - ./models:/models:ro
    ports:
      - "8081:8080"            # llama.cpp server listens on 8080 by default
    # IPC_LOCK allows use_mlock (model pinned in RAM) if enabled
    cap_add:
      - IPC_LOCK
    shm_size: "512m"
    # llama.cpp server CLI args — tuned for single-user TDG workload
    command: >
      --model /models/model.gguf
      --alias local
      --ctx-size 4096
      --threads 4
      --parallel 1
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --mlock
      --host 0.0.0.0
      --port 8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s       # pre-built image loads model much faster

volumes:
  pgdata:

