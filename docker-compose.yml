name: tdg

services:
  postgres:
    container_name: tdg-postgres
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: tdg
      POSTGRES_PASSWORD: tdg_secret
      POSTGRES_DB: tdg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tdg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: tdg-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Local LLM — Ollama (OpenAI-compatible API) ───────────────────
  # Auto-detects CPU features (AVX2/AVX-512), manages models internally.
  # Serves OpenAI-compatible API at http://localhost:11434/v1
  #
  # After starting:
  #   docker exec tdg-ollama ollama pull llama3.2:1b-instruct-q4_K_M
  #
  # Backend .env config:
  #   LOCAL_MODEL_URL=http://localhost:11434/v1
  #   LOCAL_MODEL_NAME=llama3.2:1b-instruct-q4_K_M
  #
  # Recommended models:
  #   llama3.2:1b-instruct-q4_K_M — 770MB, 128K ctx, fastest, 4-bit quantized
  #   llama3.2:1b                 — 1.3GB, 128K ctx, 8-bit (default tag)
  #   llama3.2:3b                 — 2GB, 128K ctx, better accuracy
  ollama:
    image: ollama/ollama:latest
    container_name: tdg-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      # For Linux production server: raise OLLAMA_CONTEXT_LENGTH back to 32768 or higher
      OLLAMA_CONTEXT_LENGTH: "8192"
      OLLAMA_FLASH_ATTENTION: "true"
      OLLAMA_KV_CACHE_TYPE: "q4_0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  ollama_data:
