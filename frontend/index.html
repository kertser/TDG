<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDG — Tactical Decision Game</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- App CSS -->
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <!-- ── Top Bar ─────────────────────────────────── -->
    <div id="topbar">
        <span id="app-title">TDG</span>

        <!-- Drawing tools (inline in topbar, hidden until session active) -->
        <div id="draw-toolbar" style="display:none;">
            <button class="draw-btn" data-tool="arrow" title="Curved Arrow (right-click to finish)"><svg viewBox="0 0 16 16" width="16" height="16"><path d="M2 13C5 9 9 6 13 3" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/><path d="M9 2L13.5 2.5L13 7" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <button class="draw-btn" data-tool="polyline" title="Line (right-click to finish)"><svg viewBox="0 0 16 16" width="14" height="14"><line x1="2" y1="13" x2="14" y2="3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="2" cy="13" r="1.8" fill="currentColor"/><circle cx="14" cy="3" r="1.8" fill="currentColor"/></svg></button>
            <button class="draw-btn" data-tool="rectangle" title="Rectangle (dashed)"><svg viewBox="0 0 16 16" width="14" height="14"><rect x="2" y="3.5" width="12" height="9" rx="1" stroke="currentColor" stroke-width="1.4" stroke-dasharray="2.5,1.8" fill="none"/></svg></button>
            <button class="draw-btn" data-tool="marker" title="Marker"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6C3.5 9.5 8 14.5 8 14.5S12.5 9.5 12.5 6C12.5 3.5 10.5 1.5 8 1.5Z" fill="currentColor" opacity="0.85"/><circle cx="8" cy="6" r="2" fill="#1a1a2e"/></svg></button>
            <button class="draw-btn" data-tool="ellipse" title="Ellipse (dashed)"><svg viewBox="0 0 16 16" width="14" height="14"><ellipse cx="8" cy="8" rx="6.5" ry="4.5" stroke="currentColor" stroke-width="1.4" stroke-dasharray="2.5,1.8" fill="none"/></svg></button>
            <button class="draw-btn sep" data-tool="measure" title="Measure (right-click to finish)"><svg viewBox="0 0 16 16" width="14" height="14"><line x1="1" y1="11" x2="15" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="1.5" y1="9" x2="1.5" y2="13" stroke="currentColor" stroke-width="1.3"/><line x1="14.5" y1="9" x2="14.5" y2="13" stroke="currentColor" stroke-width="1.3"/><line x1="5.5" y1="10" x2="5.5" y2="12" stroke="currentColor" stroke-width="1"/><line x1="8" y1="9.5" x2="8" y2="12.5" stroke="currentColor" stroke-width="1"/><line x1="10.5" y1="10" x2="10.5" y2="12" stroke="currentColor" stroke-width="1"/></svg></button>
        </div>

        <span id="session-info"></span>
        <span id="snail-display" title="Snail address under cursor"></span>
        <span id="coord-display" title="Coordinates under cursor"></span>
        <span id="zoom-display" title="Current zoom level"></span>

        <!-- Right-side controls (pushed right via margin-left:auto on first) -->
        <button id="center-btn" class="topbar-icon-btn" style="display:none;" title="Center on operation area"><svg viewBox="0 0 16 16" width="14" height="14"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4" fill="none"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><line x1="8" y1="0.5" x2="8" y2="3.5" stroke="currentColor" stroke-width="1.2"/><line x1="8" y1="12.5" x2="8" y2="15.5" stroke="currentColor" stroke-width="1.2"/><line x1="0.5" y1="8" x2="3.5" y2="8" stroke="currentColor" stroke-width="1.2"/><line x1="12.5" y1="8" x2="15.5" y2="8" stroke="currentColor" stroke-width="1.2"/></svg></button>
        <button id="grid-toggle-btn" class="topbar-icon-btn" style="display:none;" title="Show/hide grid"><svg viewBox="0 0 16 16" width="14" height="14"><rect x="1" y="1" width="14" height="14" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/><line x1="5.5" y1="1" x2="5.5" y2="15" stroke="currentColor" stroke-width="0.8"/><line x1="10.5" y1="1" x2="10.5" y2="15" stroke="currentColor" stroke-width="0.8"/><line x1="1" y1="5.5" x2="15" y2="5.5" stroke="currentColor" stroke-width="0.8"/><line x1="1" y1="10.5" x2="15" y2="10.5" stroke="currentColor" stroke-width="0.8"/></svg></button>
        <button id="units-toggle-btn" class="topbar-icon-btn" style="display:none;" title="Show/hide units"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M8 2C5.8 2 4 3.6 4 5.5C4 8 8 12 8 12S12 8 12 5.5C12 3.6 10.2 2 8 2Z" stroke="currentColor" stroke-width="1.2" fill="none"/><circle cx="8" cy="5.5" r="1.5" stroke="currentColor" stroke-width="1" fill="none"/><line x1="4" y1="14" x2="12" y2="14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></button>
        <button id="overlays-toggle-btn" class="topbar-icon-btn" style="display:none;" title="Show/hide overlays"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M3 12L8 3L13 12Z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/><line x1="1" y1="8" x2="5" y2="8" stroke="currentColor" stroke-width="1" stroke-dasharray="1.5,1"/><line x1="11" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1" stroke-dasharray="1.5,1"/></svg></button>
        <span id="user-info"></span>
        <button id="logout-btn" style="display:none;font-size:11px;padding:4px 8px;" title="Logout"><svg viewBox="0 0 16 16" width="12" height="12" style="vertical-align:-1px;"><path d="M6 2H3C2.4 2 2 2.4 2 3V13C2 13.6 2.4 14 3 14H6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M11 11L14 8L11 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><line x1="6" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    </div>

    <!-- ── Main Layout ─────────────────────────────── -->
    <div id="main-container">
        <!-- Map -->
        <div id="map"></div>

        <!-- Right sidebar -->
        <div id="sidebar">
            <div id="sidebar-tabs">
                <button class="tab-btn active" data-tab="session-tab">Session</button>
                <button class="tab-btn" data-tab="orders-tab">Orders</button>
                <button class="tab-btn" data-tab="events-tab">Events</button>
                <button class="tab-btn" data-tab="log-tab">Log</button>
                <button class="tab-btn" data-tab="admin-tab">Admin</button>
            </div>

            <!-- Session panel -->
            <div id="session-tab" class="tab-panel active">
                <h3>Session</h3>
                <div id="auth-panel">
                    <input type="text" id="display-name-input" placeholder="Your display name" />
                    <button id="register-btn">Register / Login</button>
                </div>
                <div id="session-panel" style="display:none;">
                    <div style="display:flex;gap:6px;flex-wrap:wrap;">
                        <button id="create-session-btn">+ New Session</button>
                    </div>
                    <button id="start-session-btn" style="display:none;">Start Session</button>
                    <button id="tick-btn" style="display:none;">▶ Advance Tick</button>
                    <div id="session-list"></div>
                </div>
                <div id="participants-panel"></div>
            </div>

            <!-- Orders panel -->
            <div id="orders-tab" class="tab-panel">
                <h3>Orders</h3>
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                    <span style="font-size:11px;color:#aaa;white-space:nowrap;">Target units (left-click to select):</span>
                    <button id="clear-unit-selection-btn" style="font-size:10px;padding:2px 6px;" title="Clear selection">✕</button>
                </div>
                <div id="selected-units-display" style="min-height:20px;margin-bottom:6px;">
                    <span style="color:#888;font-size:11px;">No units selected</span>
                </div>
                <textarea id="order-text" placeholder="Enter order text...&#10;e.g. 1st Plt move to B4-3&#10;&#10;Left-click units on map to select, then type order."></textarea>
                <button id="submit-order-btn">Submit Order</button>
                <div id="order-list"></div>
            </div>

            <!-- Events panel -->
            <div id="events-tab" class="tab-panel">
                <h3>Events</h3>
                <div id="events-list" style="overflow-y:auto;flex:1;"></div>
            </div>

            <!-- Game log panel -->
            <div id="log-tab" class="tab-panel">
                <h3>Game Log</h3>
                <div id="game-log"></div>
            </div>

            <!-- Admin panel -->
            <div id="admin-tab" class="tab-panel">
                <h3>⚙ Administration</h3>

                <div class="admin-section">
                    <h4>Session Management</h4>
                    <button id="admin-delete-all-sessions" class="admin-btn admin-btn-danger">🗑 Delete All Sessions</button>
                    <button id="admin-refresh-sessions" class="admin-btn">🔄 Refresh Sessions</button>
                    <div id="admin-session-count" class="admin-info"></div>
                </div>

                <div class="admin-section">
                    <h4>Scenario Management</h4>
                    <button id="admin-list-scenarios" class="admin-btn">📋 List Scenarios</button>
                    <button id="admin-delete-all-scenarios" class="admin-btn admin-btn-danger">🗑 Delete All Scenarios</button>
                    <div id="admin-scenario-list" class="admin-info"></div>
                </div>

                <div class="admin-section">
                    <h4>Current Session</h4>
                    <div id="admin-current-session-info" class="admin-info">No active session</div>
                    <button id="admin-pause-session" class="admin-btn" style="display:none;">⏸ Pause</button>
                    <button id="admin-reset-tick" class="admin-btn" style="display:none;">↺ Reset to Tick 0</button>
                </div>

                <div class="admin-section">
                    <h4>Database</h4>
                    <button id="admin-db-stats" class="admin-btn">📊 DB Stats</button>
                    <div id="admin-db-info" class="admin-info"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Overlay Context Menu ─────────────────────── -->
    <div id="overlay-ctx-menu" class="ctx-menu" style="display:none;">
        <div class="ctx-menu-header" id="ctx-menu-type-label"></div>
        <div class="ctx-menu-section ctx-section-label">
            <div class="ctx-label">Label</div>
            <div style="display:flex;gap:4px;">
                <input type="text" id="ctx-label-input" class="ctx-input" placeholder="Enter text…" />
                <button id="ctx-label-apply" class="ctx-apply-btn">✓</button>
            </div>
        </div>
        <div class="ctx-menu-section ctx-section-colors">
            <div class="ctx-label">Color</div>
            <div class="ctx-colors">
                <span class="ctx-color-swatch" data-color="#2196f3" style="background:#2196f3" title="Blue"></span>
                <span class="ctx-color-swatch" data-color="#f44336" style="background:#f44336" title="Red"></span>
                <span class="ctx-color-swatch" data-color="#4caf50" style="background:#4caf50" title="Green"></span>
                <span class="ctx-color-swatch" data-color="#ffeb3b" style="background:#ffeb3b" title="Yellow"></span>
                <span class="ctx-color-swatch" data-color="#ff9800" style="background:#ff9800" title="Orange"></span>
                <span class="ctx-color-swatch" data-color="#ffffff" style="background:#ffffff" title="White"></span>
                <span class="ctx-color-swatch" data-color="#000000" style="background:#000000;border:1px solid #666;" title="Black"></span>
            </div>
        </div>
        <div class="ctx-menu-section ctx-section-widths">
            <div class="ctx-label">Width</div>
            <div class="ctx-widths">
                <button class="ctx-width-btn" data-width="1">Thin</button>
                <button class="ctx-width-btn" data-width="3">Medium</button>
                <button class="ctx-width-btn" data-width="5">Thick</button>
            </div>
        </div>
        <div class="ctx-menu-section">
            <button class="ctx-item ctx-item-danger" data-action="delete"><svg viewBox="0 0 16 16" width="12" height="12" style="vertical-align:-1px;margin-right:4px;"><path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Delete</button>
        </div>
    </div>

    <!-- ── Scripts ─────────────────────────────────── -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/milsymbol@2.2.0/dist/milsymbol.js"></script>

    <script src="/js/map.js"></script>
    <script src="/js/grid.js"></script>
    <script src="/js/symbols.js"></script>
    <script src="/js/units.js"></script>
    <script src="/js/contacts.js"></script>
    <script src="/js/overlays.js"></script>
    <script src="/js/websocket.js"></script>
    <script src="/js/orders.js"></script>
    <script src="/js/events.js"></script>
    <script src="/js/reports.js"></script>
    <script src="/js/gamelog.js"></script>
    <script src="/js/session_ui.js"></script>
    <script src="/js/admin.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
